<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plantain Player</title>
<link rel="stylesheet" href="../Style/common.css">
<style>
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:var(--pt-font); background:var(--bg); color:var(--text);
    min-height:100vh; padding:24px 16px 80px;
  }
  .wrap{max-width:920px; margin:0 auto;}
  h1{font-size:26px; letter-spacing:.02em;}
  h1 .dot{color:var(--accent);}
  .tagline{color:var(--sub); font-size:13px; margin-top:4px; margin-bottom:24px;}

  section{
    background:var(--panel); border:1px solid var(--border); border-radius:var(--radius);
    padding:18px; margin-bottom:18px;
  }

  /* ===== プレイヤー本体 ===== */
  .player{display:flex; gap:26px; align-items:center; flex-wrap:wrap;}

  /* 回転ディスク */
  .discwrap{flex:0 0 auto; width:230px; height:230px; position:relative; margin:auto;}
  .disc{
    width:100%; height:100%; border-radius:50%;
    background:
      radial-gradient(circle at 50% 50%,
        transparent 0 26%,
        rgba(0,0,0,.82) 26.5% 34%,
        rgba(20,18,28,.9) 34% 96%,
        transparent 96.5%),
      repeating-radial-gradient(circle at 50% 50%,
        rgba(255,255,255,.05) 0 2px, transparent 2px 6px);
    background-color:var(--pt-canvas);
    box-shadow:0 10px 30px rgba(50,45,61,.28), inset 0 0 0 1px rgba(255,255,255,.06);
    animation:spin 9s linear infinite; animation-play-state:paused;
    position:relative;
  }
  .disc.playing{animation-play-state:running;}
  .disc .label{
    position:absolute; inset:26%; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    color:var(--pt-on-accent); font-size:30px;
    background:linear-gradient(135deg,var(--accent),var(--accent2)); /* JSで曲ごとに上書き */
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.25);
    text-shadow:0 1px 4px rgba(0,0,0,.35);
  }
  .disc .hole{
    position:absolute; left:50%; top:50%; width:12px; height:12px;
    transform:translate(-50%,-50%); border-radius:50%;
    background:var(--panel); box-shadow:0 0 0 3px rgba(0,0,0,.4);
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  /* 右側: 情報+操作 */
  .deck{flex:1 1 300px; min-width:260px;}
  .nowlabel{font-size:11px; letter-spacing:.14em; color:var(--accent); font-weight:bold;}
  .title{
    font-size:21px; font-weight:bold; margin:4px 0 2px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .subtitle{color:var(--sub); font-size:12px; margin-bottom:14px; min-height:1.2em;}

  /* シークバー */
  .seekrow{display:flex; align-items:center; gap:10px;}
  .time{font-family:var(--pt-mono); font-size:12px; color:var(--sub); min-width:42px;}
  .time.right{text-align:right;}
  input[type=range]{
    -webkit-appearance:none; appearance:none; width:100%; height:6px; border-radius:3px;
    background:linear-gradient(to right,var(--accent) 0%,var(--accent) var(--val,0%),var(--pt-line-soft) var(--val,0%));
    outline:none; cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:15px; height:15px; border-radius:50%;
    background:var(--accent); border:2px solid var(--pt-card);
    box-shadow:0 1px 4px rgba(50,45,61,.35); transition:transform .1s;
  }
  input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.2);}
  input[type=range]::-moz-range-thumb{
    width:13px; height:13px; border-radius:50%; background:var(--accent);
    border:2px solid var(--pt-card);
  }

  /* 操作ボタン */
  .controls{display:flex; align-items:center; justify-content:center; gap:14px; margin:16px 0 10px;}
  .cbtn{
    border:none; background:var(--panel2); color:var(--text); cursor:pointer;
    width:44px; height:44px; border-radius:50%; font-size:17px;
    display:flex; align-items:center; justify-content:center; transition:.15s;
  }
  .cbtn:hover{background:var(--pt-btn-hover);}
  .cbtn.main{
    width:60px; height:60px; font-size:23px;
    background:linear-gradient(135deg,var(--accent),var(--accent2)); color:var(--pt-on-accent);
    box-shadow:0 4px 14px rgba(111,95,166,.4);
  }
  .cbtn.main:hover{filter:brightness(1.08);}
  .cbtn.toggle{width:38px; height:38px; font-size:14px; color:var(--sub);}
  .cbtn.toggle.on{background:var(--accent); color:var(--pt-on-accent);}
  .cbtn .rep1{
    position:absolute; font-size:9px; font-weight:bold; transform:translate(1px,1px);
  }

  /* 音量 */
  .volrow{display:flex; align-items:center; gap:10px; max-width:230px; margin:0 auto;}
  .volrow .icon{font-size:14px; color:var(--sub); cursor:pointer; width:20px; text-align:center;}
  .volrow input[type=range]{height:5px;}

  /* ビジュアライザ */
  .vis{
    display:block; width:100%; height:64px; margin-top:16px;
    background:var(--pt-canvas); border-radius:10px;
  }

  /* ===== 歌詞 ===== */
  .lyrics{
    max-height:280px; overflow-y:auto; text-align:center;
    padding:14px 8px; scroll-behavior:smooth;
    background:var(--pt-card); border-radius:10px;
  }
  .lyrics p{
    padding:5px 8px; font-size:15px; line-height:1.7; color:var(--sub);
    border-radius:8px; transition:color .2s, transform .25s, background .2s;
    min-height:1.2em;
  }
  .lyrics p.seekable{cursor:pointer;}
  .lyrics p.seekable:hover{background:var(--pt-hover); color:var(--text);}
  .lyrics p.cur{
    color:var(--accent); font-weight:bold; transform:scale(1.05);
    background:var(--pt-hover);
  }

  /* ===== アルバム選択 ===== */
  .albums{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px;}
  .albm{
    border:1px solid var(--border); background:var(--pt-btn); color:var(--text);
    border-radius:20px; padding:6px 14px; font-size:13px; cursor:pointer;
    display:flex; align-items:center; gap:7px; transition:.15s;
  }
  .albm:hover{background:var(--pt-btn-hover);}
  .albm.on{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:var(--pt-on-accent); border-color:transparent;
    box-shadow:0 2px 8px rgba(111,95,166,.35);
  }
  .albm .n{font-size:11px; opacity:.72;}

  /* ===== プレイリスト ===== */
  .listhead{display:flex; align-items:center; gap:10px; margin-bottom:12px; flex-wrap:wrap;}
  .listhead h2{font-size:15px; display:flex; align-items:center; gap:8px;}
  .listhead .badge{
    font-size:11px; font-weight:normal; color:var(--sub);
    background:var(--panel2); border-radius:20px; padding:2px 10px;
  }
  .listhead input[type=search]{
    flex:1; min-width:140px; border:1px solid var(--border); border-radius:20px;
    padding:6px 14px; font-size:13px; background:var(--pt-field); color:var(--text); outline:none;
  }
  .listhead input[type=search]:focus{border-color:var(--accent);}
  .listhead button{
    border:1px solid var(--border); background:var(--pt-btn); color:var(--text);
    border-radius:20px; padding:6px 14px; font-size:13px; cursor:pointer; transition:.15s;
  }
  .listhead button:hover{background:var(--pt-btn-hover);}

  ul.songs{list-style:none;}
  ul.songs li{
    display:flex; align-items:center; gap:12px; padding:9px 12px;
    border-radius:10px; cursor:pointer; border-bottom:1px solid var(--pt-line-soft);
    transition:background .12s;
  }
  ul.songs li:last-child{border-bottom:none;}
  ul.songs li:hover{background:var(--pt-hover);}
  ul.songs li .no{
    font-family:var(--pt-mono); font-size:11px; color:var(--sub); width:24px; text-align:right;
  }
  ul.songs li .chip{
    width:30px; height:30px; border-radius:8px; flex:0 0 auto;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex; align-items:center; justify-content:center;
    color:var(--pt-on-accent); font-size:13px;
  }
  ul.songs li .mid{
    flex:1; min-width:0; display:flex; align-items:center; gap:8px;
  }
  ul.songs li .name{
    flex:0 1 auto; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  ul.songs li .tagslot{
    flex:0 0 auto; width:64px; display:flex; justify-content:center;
  }
  ul.songs li .tag{
    font-size:10px; color:var(--pt-accent-2);
    border:1px solid currentColor; border-radius:10px; padding:1px 8px; white-space:nowrap;
  }
  ul.songs li .dl{
    flex:0 0 auto; border:none; background:none; color:var(--sub); cursor:pointer;
    width:30px; height:30px; border-radius:50%; font-size:15px;
    display:flex; align-items:center; justify-content:center; transition:.15s;
  }
  ul.songs li .dl.off{visibility:hidden;}
  ul.songs li .dl:hover{background:var(--pt-btn-hover); color:var(--accent);}
  ul.songs li.active{background:var(--pt-card); box-shadow:inset 0 0 0 1px var(--accent);}
  ul.songs li.active .name{color:var(--accent); font-weight:bold;}
  ul.songs li .eq{display:none; gap:2px; align-items:flex-end; height:14px;}
  ul.songs li.active.playing .eq{display:flex;}
  .eq span{width:3px; background:var(--accent); border-radius:1px; animation:eq .8s ease-in-out infinite;}
  .eq span:nth-child(1){animation-delay:0s;} .eq span:nth-child(2){animation-delay:.25s;}
  .eq span:nth-child(3){animation-delay:.5s;}
  @keyframes eq{0%,100%{height:4px;}50%{height:14px;}}

  .hint{color:var(--sub); font-size:12px; margin-top:10px; line-height:1.6;}
  .status{font-size:12px; margin-top:8px; min-height:1.2em;}
  .status.warn{color:var(--pt-warn);}
  .status.ok{color:var(--pt-ok);}
  kbd{
    font-family:var(--pt-mono); font-size:11px; background:var(--pt-card);
    border:1px solid var(--border); border-bottom-width:2px; border-radius:4px; padding:0 5px;
  }

  @media (max-width:640px){
    .player{flex-direction:column;}
    .discwrap{width:180px; height:180px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Plantain Player<span class="dot">.</span></h1>
  <div class="tagline">AI 楽曲を再生するミュージックプレイヤー</div>

  <section>
    <div class="player">
      <div class="discwrap">
        <div class="disc" id="disc">
          <div class="label" id="discLabel">♪</div>
          <div class="hole"></div>
        </div>
      </div>
      <div class="deck">
        <div class="nowlabel">NOW PLAYING</div>
        <div class="title" id="title">曲を選択してください</div>
        <div class="subtitle" id="subtitle">&nbsp;</div>
        <div class="seekrow">
          <span class="time" id="tCur">0:00</span>
          <input type="range" id="seek" min="0" max="1000" value="0" step="1">
          <span class="time right" id="tDur">0:00</span>
        </div>
        <div class="controls">
          <button class="cbtn toggle" id="btnShuffle" title="シャッフル">⤨</button>
          <button class="cbtn" id="btnPrev" title="前の曲 / 曲頭へ">⏮</button>
          <button class="cbtn main" id="btnPlay" title="再生/一時停止">▶</button>
          <button class="cbtn" id="btnNext" title="次の曲">⏭</button>
          <button class="cbtn toggle" id="btnRepeat" title="リピート: オフ→全曲→1曲">↻</button>
        </div>
        <div class="volrow">
          <span class="icon" id="volIcon" title="ミュート切替">🔊</span>
          <input type="range" id="vol" min="0" max="100" value="80">
        </div>
      </div>
    </div>
    <canvas class="vis" id="vis"></canvas>
  </section>

  <section id="lyrSec" style="display:none">
    <div class="listhead" style="margin-bottom:10px">
      <h2>歌詞 <span class="badge" id="lyrBadge"></span></h2>
    </div>
    <div class="lyrics" id="lyrBox"></div>
  </section>

  <section>
    <div class="albums" id="albums"></div>
    <div class="listhead">
      <h2>プレイリスト <span class="badge" id="count">0曲</span></h2>
      <input type="search" id="filter" placeholder="曲名で絞り込み">
    </div>
    <ul class="songs" id="songList"></ul>
    <div class="status" id="status"></div>
    <div class="hint">
      <kbd>Space</kbd> 再生/停止 · <kbd>←</kbd><kbd>→</kbd> ±5秒 · <kbd>↑</kbd><kbd>↓</kbd> 音量 · <kbd>N</kbd>/<kbd>P</kbd> 次/前の曲
    </div>
  </section>
</div>

<audio id="audio" preload="metadata"></audio>

<script>
"use strict";
const $=id=>document.getElementById(id);
const SONGS_DIR="../Songs/";
const AUDIO_RE=/\.(mp3|wav|m4a|aac|ogg|opus|flac|webm)$/i;
const LS="plantainPlayer.";

const audio=$("audio");
let songMeta=[];       // songs.json の全曲 [{name, canDL}]
let albums=[];         // album.json [{name, songs:[...]}]
let lyricsMap={};      // 曲名 → 歌詞jsonの有無
let curAlbum=localStorage.getItem(LS+"album")||""; // ""=すべて
let songs=[];          // 現在の表示キュー (曲名の配列)
let cur=-1;            // songs 内の現在インデックス
let playingName=null;  // 再生中の曲名 (アルバム切替時の追跡用)
let shuffle=localStorage.getItem(LS+"shuffle")==="1";
let repeat=localStorage.getItem(LS+"repeat")||"off"; // off | all | one
let seeking=false;

/* ---------- ユーティリティ ---------- */
function fmt(s){
  if(!isFinite(s)) return "0:00";
  s=Math.max(0,Math.round(s));
  return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");
}
function baseName(n){ return n.replace(/\.[^.]+$/,""); }
function setStatus(msg,cls){ const el=$("status"); el.textContent=msg||""; el.className="status "+(cls||""); }
function hueOf(n){ let h=0; for(const c of n) h=(h*31+c.codePointAt(0))>>>0; return h%360; }
function gradOf(n){
  const h=hueOf(n);
  return `linear-gradient(135deg, hsl(${h} 42% 58%), hsl(${(h+70)%360} 45% 45%))`;
}
function setRangeFill(el,pct){ el.style.setProperty("--val",pct+"%"); }

/* ---------- 曲一覧の取得 (songs.json → ディレクトリ一覧) ---------- */
function metaOf(n){ return songMeta.find(m=>m.name===n); }
function albumOf(n){ const a=albums.find(a=>a.songs.includes(n)); return a?a.name:null; }

async function listSongs(){
  let meta=null;
  try{
    const res=await fetch(SONGS_DIR+"songs.json",{cache:"no-store"});
    if(res.ok){
      const o=await res.json();
      const arr=Array.isArray(o)?o:(o&&o.songs)||[];
      meta=arr.map(x=>
        typeof x==="string" ? {name:x,canDL:false} :
        (x&&typeof x.name==="string") ? {name:x.name,canDL:!!x.canDL} : null
      ).filter(Boolean);
    }
  }catch(e){}
  if(!meta){ // fallback: ディレクトリ一覧 (canDL は不明のため不可扱い)
    try{
      const res=await fetch(SONGS_DIR,{cache:"no-store"});
      if(!res.ok) throw new Error("HTTP "+res.status);
      const doc=new DOMParser().parseFromString(await res.text(),"text/html");
      meta=[...doc.querySelectorAll("a[href]")]
        .map(a=>{ try{ return decodeURIComponent(a.getAttribute("href").split("?")[0].replace(/\/$/,"").split("/").pop()); }catch(e){ return ""; } })
        .filter(n=>AUDIO_RE.test(n))
        .map(n=>({name:n,canDL:false}));
    }catch(e){}
  }
  if(!meta){
    setStatus("Songs一覧を取得できません。Songs/songs.json を置くか、ローカルサーバー (例: python -m http.server) 経由で開いてください。","warn");
    return;
  }
  const seen=new Set();
  songMeta=meta.filter(m=>!seen.has(m.name)&&seen.add(m.name));

  albums=[];
  try{
    const res=await fetch(SONGS_DIR+"album.json",{cache:"no-store"});
    if(res.ok){
      const o=await res.json();
      if(Array.isArray(o))
        albums=o.filter(a=>a&&typeof a.name==="string"&&Array.isArray(a.songs))
                .map(a=>({name:a.name,songs:a.songs.filter(n=>metaOf(n))}));
    }
  }catch(e){}
  if(curAlbum&&!albums.some(a=>a.name===curAlbum)) curAlbum="";

  renderAlbums();
  buildQueue();
  setStatus(songMeta.length?"":"songs.json に曲がありません。","warn");
  checkLyrics();
}

/* ---------- アルバム ---------- */
function renderAlbums(){
  const box=$("albums"); box.innerHTML="";
  const mk=(label,key,count)=>{
    const b=document.createElement("button");
    b.className="albm"+(curAlbum===key?" on":"");
    const s1=document.createElement("span"), s2=document.createElement("span");
    s1.textContent=label; s2.className="n"; s2.textContent=count+"曲";
    b.append(s1,s2);
    b.onclick=()=>{
      curAlbum=key; localStorage.setItem(LS+"album",key);
      renderAlbums(); buildQueue();
    };
    box.appendChild(b);
  };
  mk("すべて","",songMeta.length);
  for(const a of albums) mk(a.name,a.name,a.songs.length);
}
function buildQueue(){
  if(curAlbum){
    const a=albums.find(x=>x.name===curAlbum);
    songs=a?[...a.songs]:[];             // アルバムは album.json の曲順
  }else{
    songs=songMeta.map(m=>m.name).sort((a,b)=>a.localeCompare(b,"ja"));
  }
  cur=playingName?songs.indexOf(playingName):-1;
  renderList();
}

/* ---------- ダウンロード / 歌詞タグ ---------- */
function downloadSong(n){
  const a=document.createElement("a");
  a.href=SONGS_DIR+encodeURIComponent(n); a.download=n;
  document.body.appendChild(a); a.click(); a.remove();
}
async function checkLyrics(){
  await Promise.all(songMeta.map(async m=>{
    if(m.name in lyricsMap) return;
    try{
      const exists=async ext=>{
        const url=SONGS_DIR+encodeURIComponent(baseName(m.name)+ext);
        let res=await fetch(url,{method:"HEAD",cache:"no-store"});
        if(!res.ok&&res.status!==404) res=await fetch(url,{cache:"no-store"}); // HEAD非対応サーバー
        return res.ok;
      };
      lyricsMap[m.name]=await exists(".json")||await exists(".md");
    }catch(e){ lyricsMap[m.name]=false; }
  }));
  renderList();
}

/* ---------- プレイリスト描画 ---------- */
function renderList(){
  const q=$("filter").value.trim().toLowerCase();
  const ul=$("songList"); ul.innerHTML="";
  songs.forEach((n,i)=>{
    if(q && !n.toLowerCase().includes(q)) return;
    const li=document.createElement("li");
    li.dataset.i=i;
    const canDL=!!metaOf(n)?.canDL;
    li.innerHTML=
      `<span class="no">${i+1}</span>`+
      `<span class="chip" style="background:${gradOf(n)}">♪</span>`+
      `<span class="mid"><span class="name"></span>`+
        `<span class="eq"><span></span><span></span><span></span></span></span>`+
      `<span class="tagslot">${lyricsMap[n]?'<span class="tag">歌詞あり</span>':''}</span>`+
      `<button class="dl${canDL?'':' off'}" title="ダウンロード"${canDL?'':' tabindex="-1"'}>⬇</button>`;
    li.querySelector(".name").textContent=baseName(n);
    li.title=n;
    li.onclick=()=>play(i);
    if(canDL) li.querySelector(".dl").onclick=e=>{ e.stopPropagation(); downloadSong(n); };
    ul.appendChild(li);
  });
  $("count").textContent=songs.length+"曲";
  updateActive();
}
function updateActive(){
  document.querySelectorAll("#songList li").forEach(li=>{
    const on=+li.dataset.i===cur;
    li.classList.toggle("active",on);
    li.classList.toggle("playing",on&&!audio.paused);
  });
}

/* ---------- 再生制御 ---------- */
function play(i){
  if(i<0||i>=songs.length) return;
  cur=i;
  const n=songs[i];
  playingName=n;
  audio.src=SONGS_DIR+encodeURIComponent(n);
  audio.play().catch(e=>setStatus("再生できません: "+n+" ("+e.message+")","warn"));
  $("title").textContent=baseName(n);
  $("title").title=n;
  const alb=albumOf(n);
  $("subtitle").textContent=(alb?alb+" · ":"")+n;
  $("discLabel").style.background=gradOf(n);
  localStorage.setItem(LS+"last",n);
  updateMediaSession(n);
  updateActive();
  loadLyrics(n);
}
function next(auto){
  if(!songs.length) return;
  if(shuffle && songs.length>1){
    let i; do{ i=Math.floor(Math.random()*songs.length); }while(i===cur);
    play(i);
  }else{
    const i=cur+1;
    if(i>=songs.length){
      if(repeat==="all"||!auto) play(0);
    }else play(i);
  }
}
function prev(){
  if(audio.currentTime>3){ audio.currentTime=0; return; }
  if(shuffle){ next(false); return; }
  play(cur<=0?songs.length-1:cur-1);
}
function togglePlay(){
  if(cur<0){ if(songs.length) play(0); return; }
  if(audio.paused) audio.play(); else audio.pause();
}

audio.onended=()=>{
  if(repeat==="one"){ audio.currentTime=0; audio.play(); }
  else next(true);
};
audio.onplay=()=>{
  $("btnPlay").textContent="⏸";
  $("disc").classList.add("playing");
  initVis();
  updateActive();
};
audio.onpause=()=>{
  $("btnPlay").textContent="▶";
  $("disc").classList.remove("playing");
  updateActive();
};
audio.ontimeupdate=()=>{
  if(seeking) return;
  const d=audio.duration||0, t=audio.currentTime||0;
  const pct=d?t/d*100:0;
  $("seek").value=d?Math.round(t/d*1000):0;
  setRangeFill($("seek"),pct);
  $("tCur").textContent=fmt(t);
  $("tDur").textContent=fmt(d);
  updateLyric(t);
};
audio.onerror=()=>{ if(cur>=0) setStatus("読み込みエラー: "+songs[cur],"warn"); };

/* ---------- UI イベント ---------- */
$("btnPlay").onclick=togglePlay;
$("btnNext").onclick=()=>next(false);
$("btnPrev").onclick=prev;

$("btnShuffle").onclick=()=>{
  shuffle=!shuffle;
  localStorage.setItem(LS+"shuffle",shuffle?"1":"0");
  syncToggles();
};
$("btnRepeat").onclick=()=>{
  repeat=repeat==="off"?"all":repeat==="all"?"one":"off";
  localStorage.setItem(LS+"repeat",repeat);
  syncToggles();
};
function syncToggles(){
  $("btnShuffle").classList.toggle("on",shuffle);
  const r=$("btnRepeat");
  r.classList.toggle("on",repeat!=="off");
  r.innerHTML=repeat==="one"?'↻<span class="rep1">1</span>':"↻";
  r.title="リピート: "+(repeat==="off"?"オフ":repeat==="all"?"全曲":"1曲");
}

const seekEl=$("seek");
seekEl.oninput=()=>{
  seeking=true;
  const d=audio.duration||0;
  setRangeFill(seekEl,seekEl.value/10);
  $("tCur").textContent=fmt(d*seekEl.value/1000);
};
seekEl.onchange=()=>{
  const d=audio.duration||0;
  if(d) audio.currentTime=d*seekEl.value/1000;
  seeking=false;
};

const volEl=$("vol");
let lastVol=+(localStorage.getItem(LS+"vol")??80);
function setVol(v){
  v=Math.min(100,Math.max(0,v));
  volEl.value=v;
  audio.volume=v/100;
  setRangeFill(volEl,v);
  $("volIcon").textContent=v===0?"🔇":v<50?"🔉":"🔊";
  localStorage.setItem(LS+"vol",v);
}
volEl.oninput=()=>setVol(+volEl.value);
$("volIcon").onclick=()=>{
  if(+volEl.value>0){ lastVol=+volEl.value; setVol(0); }
  else setVol(lastVol||80);
};

$("filter").oninput=renderList;

/* ---------- 歌詞 ---------- */
let lyr={lines:null,timed:false,el:[],cur:-1};
function numOr(v){ const n=+v; return (v==null||v===""||isNaN(n))?null:n; }
function parseTextLyrics(s){
  const lrc=/^\s*\[(\d+):(\d+(?:\.\d+)?)\]\s*/;
  return s.split(/\r?\n/).map(row=>{
    let t=null,txt=row;
    const m=row.match(lrc);
    if(m){ t=(+m[1])*60+ +m[2]; txt=row.replace(lrc,""); }
    return {text:txt.trim(),start:t,end:null};
  });
}
function normLyrics(d){
  if(typeof d==="string") return parseTextLyrics(d);
  if(Array.isArray(d)){
    if(d.every(x=>typeof x==="string")) return d.map(s=>({text:s.trim(),start:null,end:null}));
    return d.filter(x=>x&&typeof x.text==="string")
            .map(x=>({text:x.text.trim(),start:numOr(x.start??x.t??x.time),end:numOr(x.end)}));
  }
  if(d&&typeof d==="object"){
    if(Array.isArray(d.lines)) return normLyrics(d.lines);   // lyric-subtitler プロジェクトJSON
    if(typeof d.lyrics==="string") return parseTextLyrics(d.lyrics);
  }
  return null;
}
async function loadLyrics(n){
  const sec=$("lyrSec"), box=$("lyrBox");
  lyr={lines:null,timed:false,el:[],cur:-1};
  sec.style.display="none"; box.innerHTML="";
  try{
    let lines=null;
    const res=await fetch(SONGS_DIR+encodeURIComponent(baseName(n)+".json"),{cache:"no-store"});
    if(res.ok){
      lines=normLyrics(await res.json());
    }else{ // フォールバック: 曲名.md (プレーンテキスト歌詞)
      const md=await fetch(SONGS_DIR+encodeURIComponent(baseName(n)+".md"),{cache:"no-store"});
      if(md.ok) lines=parseTextLyrics(await md.text());
    }
    if(!lines) return;
    // 前後の空行を除去 (中間の空行は間隔として残す)
    while(lines.length&&!lines[0].text) lines.shift();
    while(lines.length&&!lines[lines.length-1].text) lines.pop();
    if(!lines.length) return;
    lyr.lines=lines;
    lyr.timed=lines.some(l=>l.start!=null);
    for(const l of lines){
      const p=document.createElement("p");
      p.textContent=l.text||" ";
      if(lyr.timed&&l.start!=null){
        p.classList.add("seekable");
        p.onclick=()=>{ audio.currentTime=l.start; audio.play(); };
      }
      box.appendChild(p);
    }
    lyr.el=[...box.children];
    $("lyrBadge").textContent=lyr.timed?"同期":"テキスト";
    sec.style.display="";
  }catch(e){}
}
function updateLyric(t){
  if(!lyr.timed) return;
  const L=lyr.lines;
  let idx=-1;
  for(let i=0;i<L.length;i++) if(L[i].start!=null&&t>=L[i].start-0.05) idx=i;
  if(idx===lyr.cur) return;
  if(lyr.cur>=0) lyr.el[lyr.cur].classList.remove("cur");
  lyr.cur=idx;
  if(idx>=0){
    const p=lyr.el[idx], box=$("lyrBox");
    p.classList.add("cur");
    box.scrollTo({top:p.offsetTop-box.offsetTop-box.clientHeight/2+p.offsetHeight/2,behavior:"smooth"});
  }
}

document.addEventListener("keydown",e=>{
  if(e.target.matches("input,select,textarea")) return;
  switch(e.key){
    case " ": e.preventDefault(); togglePlay(); break;
    case "ArrowRight": audio.currentTime=Math.min(audio.duration||0,audio.currentTime+5); break;
    case "ArrowLeft": audio.currentTime=Math.max(0,audio.currentTime-5); break;
    case "ArrowUp": e.preventDefault(); setVol(+volEl.value+5); break;
    case "ArrowDown": e.preventDefault(); setVol(+volEl.value-5); break;
    case "n": case "N": next(false); break;
    case "p": case "P": prev(); break;
  }
});

/* ---------- Media Session (OSのメディアキー対応) ---------- */
function updateMediaSession(n){
  if(!("mediaSession" in navigator)) return;
  navigator.mediaSession.metadata=new MediaMetadata({title:baseName(n),artist:"Plantain Player"});
  navigator.mediaSession.setActionHandler("play",()=>audio.play());
  navigator.mediaSession.setActionHandler("pause",()=>audio.pause());
  navigator.mediaSession.setActionHandler("previoustrack",prev);
  navigator.mediaSession.setActionHandler("nexttrack",()=>next(false));
}

/* ---------- ビジュアライザ ---------- */
let ac=null, analyser=null, visRunning=false;
function initVis(){
  if(!analyser){
    try{
      ac=new (window.AudioContext||window.webkitAudioContext)();
      const src=ac.createMediaElementSource(audio);
      analyser=ac.createAnalyser();
      analyser.fftSize=256;
      analyser.smoothingTimeConstant=.82;
      src.connect(analyser); analyser.connect(ac.destination);
    }catch(e){ analyser=null; return; }
  }
  if(ac.state==="suspended") ac.resume();
  if(!visRunning){ visRunning=true; drawVis(); }
}
function drawVis(){
  requestAnimationFrame(drawVis);
  const cv=$("vis"), ctx=cv.getContext("2d");
  const w=cv.clientWidth, h=cv.clientHeight;
  if(cv.width!==w*devicePixelRatio){ cv.width=w*devicePixelRatio; cv.height=h*devicePixelRatio; ctx.scale(devicePixelRatio,devicePixelRatio); }
  ctx.clearRect(0,0,w,h);
  if(!analyser) return;
  const data=new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  const bars=64, gap=2, bw=(w-gap*(bars-1))/bars;
  const css=getComputedStyle(document.documentElement);
  const c1=css.getPropertyValue("--pt-accent").trim()||"#6f5fa6";
  const c2=css.getPropertyValue("--pt-accent-2").trim()||"#3f7b96";
  for(let i=0;i<bars;i++){
    const v=data[Math.floor(i*data.length/bars*.85)]/255;
    const bh=Math.max(2,v*(h-8));
    const g=ctx.createLinearGradient(0,h,0,h-bh);
    g.addColorStop(0,c1); g.addColorStop(1,c2);
    ctx.fillStyle=g;
    ctx.globalAlpha=audio.paused?.35:1;
    ctx.beginPath();
    ctx.roundRect(i*(bw+gap),h-4-bh,bw,bh,2);
    ctx.fill();
  }
  ctx.globalAlpha=1;
}

/* ---------- 初期化 ---------- */
setVol(lastVol);
syncToggles();
listSongs().then(()=>{
  const last=localStorage.getItem(LS+"last");
  if(last&&songs.includes(last)){

    const alb=albumOf(n);
    $("subtitle").textContent=(alb?alb+" · ":"")+n;
    $("discLabel").style.background=gradOf(n);
    updateActive();
    loadLyrics(n);
  }
});
drawVis();
